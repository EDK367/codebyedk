<main class="page-container">
  <nav>
    <app-nav></app-nav>
  </nav>

  <!-- Unique 3D Perspective Grid Effect -->
  <div class="perspective-grid-bg"></div>

  <div class="content-wrapper">
    <div class="page-header reveal-scale">
      <h1 class="page-title gradient-text">{{ ts.t().MORE_PROJECTS_TITLE }}</h1>
      <div class="header-divider"></div>
    </div>

    <!-- Filters -->
    <div class="filters-container reveal-up">
      <button 
        *ngFor="let filter of filters" 
        class="filter-btn" 
        [class.active]="activeFilter === filter"
        (click)="setFilter(filter)"
        [attr.data-cursor]="'Filter: ' + filter">
        {{ filter }}
      </button>
    </div>

    <!-- Projects Grid -->
    <div class="projects-grid">
      <div *ngFor="let p of filteredProjects; let i = index" 
           class="project-card-wrapper reveal-up" 
           [style.transition-delay]="(i * 0.1) + 's'">
        
        <div class="project-card">
          <div class="card-image-container">
            <img [src]="p.imageUrl" [alt]="p.title" class="project-image">
            <div class="image-overlay"></div>
          </div>
          
          <div class="card-content">
            <div class="tech-tags">
              <span *ngFor="let tag of p.tags" class="tech-tag">{{ tag }}</span>
            </div>
            
            <h3 class="project-title">{{ p.title }}</h3>
            <p class="project-desc">{{ p.shortDescription }}</p>
            
            <div class="project-actions">
              <a *ngIf="p.githubUrl" [href]="p.githubUrl" target="_blank" rel="noopener" class="action-btn action-github" data-cursor="View Source">
                <i class="fab fa-github"></i>
              </a>
              <a [routerLink]="['/project', p.id]" class="action-btn action-details" data-cursor="View Details">
                <span>{{ ts.t().DETAILS_BTN }}</span>
                <i class="fas fa-arrow-right"></i>
              </a>
            </div>
          </div>
        </div>

      </div>
    </div>
  </div>
</main>
