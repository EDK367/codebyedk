<main>
  <div class="about">
    <div class="text">
      <h1 class="greeting">{{ ts.t().ABOUT_GREETING }}</h1>
      <h2 class="title">{{ ts.t().ABOUT_TITLE }}</h2>
      <p class="info">
        {{ ts.t().ABOUT_INFO_1 }}
        {{ ts.t().ABOUT_INFO_2 }}
        <br />
        {{ ts.t().ABOUT_INFO_3 }}
        <br />
        {{ ts.t().ABOUT_INFO_4 }}
      </p>
    </div>
    <div class="image">
      <img src="assets/img/img-gopher-java.png" alt="gopher" />
    </div>
  </div>

  <div class="more-button">
    <a routerLink="/more-about">
    <app-more-button [text]="ts.t().ABOUT_MORE_BTN"></app-more-button>
    </a>
  </div>
</main>
