<div class="about-container reveal" #aboutSection>
  <canvas #aboutCanvas class="section-canvas"></canvas>

  <div class="about-header reveal-left">
    <div class="section-badge">
      <span class="badge-dot"></span>
      <span class="badge-text">01 // Profile</span>
    </div>
    <h2 class="section-title">
      <span class="gradient-text">{{ ts.t().ABOUT_GREETING }}</span>
    </h2>
    <h3 class="section-subtitle">{{ ts.t().ABOUT_TITLE }}</h3>
  </div>

  <div class="about-content">
    <div class="about-text-column reveal-left">
      <div class="text-block">
        <p>
          {{ ts.t().ABOUT_INFO_1 }}
          {{ ts.t().ABOUT_INFO_2 }}
        </p>
        <p>
          {{ ts.t().ABOUT_INFO_3 }}
          {{ ts.t().ABOUT_INFO_4 }}
        </p>
      </div>

      <div class="about-actions mt-4">
        <a routerLink="/more-about" class="premium-button premium-button-primary" data-cursor="Read More">
          <span class="button-content">
            {{ ts.t().ABOUT_MORE_BTN }}
            <i class="fas fa-arrow-right"></i>
          </span>
          <span class="button-glare"></span>
        </a>
      </div>
    </div>

    <div class="about-visual-column reveal-scale">
      <div class="holographic-card-container" #cardContainer>
        <div class="holographic-card">
          <div class="card-glow"></div>
          <div class="card-scanline"></div>
          <div class="card-content-inner">
            <div class="profile-image-wrapper">
              <img src="assets/img/img-gopher-java.png" alt="Profile Visual" class="profile-image">
            </div>
            
            <div class="card-data">
              <div class="data-row">
                <span class="data-label">Status</span>
                <span class="data-value status-online">Online</span>
              </div>
              <div class="data-row">
                <span class="data-label">Role</span>
                <span class="data-value">Backend Specialist</span>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
