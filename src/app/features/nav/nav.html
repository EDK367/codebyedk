<header class="nav-header" [class.scrolled]="isScrolled">
  <nav class="nav-inner">
    <!-- Logo -->
    <a class="nav-logo" [routerLink]="['/']" data-cursor="Home">
      <span class="logo-symbol">&lt;/&gt;</span>
      <span class="logo-text">EDK367</span>
    </a>

    <!-- Desktop Links -->
    <div class="nav-links">
      <a href="#about" class="nav-link" [class.active]="activeSection === 'about'">
        {{ ts.t().NAV_ABOUT }}
      </a>
      <a href="#technologies" class="nav-link" [class.active]="activeSection === 'technologies'">
        {{ ts.t().NAV_TECHNOLOGIES }}
      </a>
      <a href="#projects" class="nav-link" [class.active]="activeSection === 'projects'">
        {{ ts.t().NAV_PROJECTS }}
      </a>
      <a href="#contact" class="nav-link" [class.active]="activeSection === 'contact'">
        {{ ts.t().NAV_CONTACT }}
      </a>
      <a [href]="ts.currentLanguage() === 'en'
    ? 'assets/doc/CVErikson_Orozco_EN.pdf'
    : 'assets/doc/CVErikson_Orozco_ES.pdf'" [attr.download]="ts.currentLanguage() === 'en'
    ? 'CVErikson_Orozco_EN.pdf'
    : 'CVErikson_Orozco_ES.pdf'" class="nav-link nav-link-cv">
        {{ ts.t().NAV_CV }}
      </a>
    </div>

    <!-- Controls -->
    <div class="nav-controls">
      <!-- Language Toggle -->
      <button class="control-btn lang-toggle" (click)="ts.toggleLanguage()"
        aria-label="Toggle Language">
        <span class="lang-label">{{ ts.currentLanguage() === 'en' ? 'EN' : 'ES' }}</span>
      </button>


      <!-- Theme Toggle 
      <button class="control-btn theme-toggle" (click)="toggleTheme()" data-cursor="Toggle Theme" aria-label="Toggle Theme">
        <i class="fas" [class.fa-moon]="isDarkTheme" [class.fa-sun]="!isDarkTheme"></i>
      </button>
      -->

      <!-- Mobile Hamburger -->
      <button class="hamburger" [class.active]="mobileMenuOpen" (click)="toggleMobileMenu()" aria-label="Toggle Menu">
        <span class="hamburger-line"></span>
        <span class="hamburger-line"></span>
        <span class="hamburger-line"></span>
      </button>
    </div>
  </nav>
</header>

<!-- Mobile Overlay Menu -->
<div class="mobile-overlay" [class.open]="mobileMenuOpen" (click)="closeMobileMenu()">
  <div class="mobile-menu" (click)="$event.stopPropagation()">
    <div class="mobile-menu-header">
      <span class="logo-symbol">&lt;/&gt;</span>
      <span class="logo-text">EDK</span>
    </div>
    <nav class="mobile-nav-links">
      <a href="#about" class="mobile-link" (click)="closeMobileMenu()">
        <span class="mobile-link-number">01</span>
        <span>{{ ts.t().NAV_ABOUT }}</span>
      </a>
      <a href="#technologies" class="mobile-link" (click)="closeMobileMenu()">
        <span class="mobile-link-number">02</span>
        <span>{{ ts.t().NAV_TECHNOLOGIES }}</span>
      </a>
      <a href="#projects" class="mobile-link" (click)="closeMobileMenu()">
        <span class="mobile-link-number">03</span>
        <span>{{ ts.t().NAV_PROJECTS }}</span>
      </a>
      <a href="#contact" class="mobile-link" (click)="closeMobileMenu()">
        <span class="mobile-link-number">04</span>
        <span>{{ ts.t().NAV_CONTACT }}</span>
      </a>
      <a href="javascript:void(0)" class="mobile-link" (click)="downloadCV()">
        <span class="mobile-link-number">05</span>
        <span>{{ ts.t().NAV_CV }}</span>
      </a>
    </nav>
    <div class="mobile-menu-footer">
      <button class="control-btn" (click)="ts.toggleLanguage()">
        {{ ts.currentLanguage() === 'en' ? 'EN → ES' : 'ES → EN' }}
      </button>
      <button class="control-btn" (click)="toggleTheme()">
        <i class="fas" [class.fa-moon]="isDarkTheme" [class.fa-sun]="!isDarkTheme"></i>
        {{ isDarkTheme ? 'Dark' : 'Light' }}
      </button>
    </div>
  </div>
</div>
