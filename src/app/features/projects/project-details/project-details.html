<main class="page-container" *ngIf="project">
  <nav>
    <app-nav></app-nav>
  </nav>

  <!-- Cinematic Hero Header -->
  <div class="project-hero">
    <div class="hero-bg">
      <img [src]="project.imageUrl" [alt]="project.title">
      <div class="hero-overlay"></div>
    </div>
    
    <div class="hero-content reveal-scale">
      <div class="tech-tags">
        <span *ngFor="let tag of project.tags" class="tech-tag">{{ tag }}</span>
      </div>
      <h1 class="project-title gradient-text">{{ project.title }}</h1>
      <p class="project-subtitle">{{ project.shortDescription }}</p>
      
      <div class="hero-actions">
        <a *ngIf="project.githubUrl" [href]="project.githubUrl" target="_blank" rel="noopener" class="premium-button premium-button-primary" data-cursor="View Source">
          <span class="button-content">
            View on GitHub
            <i class="fab fa-github"></i>
          </span>
          <span class="button-glare"></span>
        </a>
      </div>
    </div>
  </div>

  <div class="content-wrapper">
    <div class="details-grid">
      <!-- Main Content -->
      <div class="main-column reveal-left">
        <div class="glass-panel">
          <h2 class="section-heading">Overview</h2>
          <div class="description-content" [innerHTML]="project.fullDescription"></div>
          
          <h2 class="section-heading mt-5">Key Features</h2>
          <ul class="styled-list">
            <li *ngFor="let feature of project.features">
              <strong>Feature:</strong> {{ feature }}
            </li>
          </ul>
        </div>
      </div>

      <!-- Sidebar -->
      <div class="sidebar-column reveal-right">
        <div class="glass-panel sticky-sidebar">
          <h3 class="sidebar-heading">Technologies Used</h3>
          <div class="tech-grid">
            <div *ngFor="let tech of project.technologies" class="tech-item">
              <i class="fas fa-check-circle text-accent"></i>
              <span>{{ tech }}</span>
            </div>
          </div>
          
          <div class="sidebar-divider"></div>
          
          <div class="project-links">
            <a *ngIf="project.githubUrl" [href]="project.githubUrl" target="_blank" rel="noopener" class="sidebar-link">
              <i class="fab fa-github"></i> Repository
            </a>
            <a routerLink="/more-projects" class="sidebar-link back-link">
              <i class="fas fa-arrow-left"></i> Back to Projects
            </a>
          </div>
        </div>
      </div>
    </div>
  </div>
</main>

<main class="page-container" *ngIf="!project">
  <nav>
    <app-nav></app-nav>
  </nav>
  <div class="content-wrapper not-found">
    <h1>Project not found.</h1>
    <a routerLink="/more-projects" class="premium-button premium-button-primary mt-4">
      <span class="button-content">Go Back</span>
      <span class="button-glare"></span>
    </a>
  </div>
</main>
